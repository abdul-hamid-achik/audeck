version: '3'

env:
  CGO_ENABLED: 1
  CGO_LDFLAGS: -framework CoreAudio -framework AudioToolbox -framework Foundation

vars:
  APP_NAME: audeck
  BUILD_DIR: build

tasks:
  build:
    desc: Build the application
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -o {{.BUILD_DIR}}/{{.APP_NAME}} ./cmd/audeck

  run:
    desc: Build and run the application
    deps: [build]
    cmds:
      - ./{{.BUILD_DIR}}/{{.APP_NAME}}

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  install:
    desc: Install dependencies
    cmds:
      - go mod download
      - go mod tidy
